name: CI and deploy preview to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Validate and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: read
    concurrency:
      group: ${{ github.workflow }}-build-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: npm run check

      - name: Configure GitHub Pages
        id: pages
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Build for GitHub Pages
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build -- --base "$BASE_PATH/"

      - name: Build pull request
        if: ${{ github.ref != 'refs/heads/main' }}
        run: npm run build

      - name: Verify Pages artifact
        run: |
          test -s dist/index.html
          test "$(find dist/assets -type f -name 'pet-*.json' -size +0c | wc -l)" -eq 4
          mapfile -t spritesheets < <(find dist/assets -type f -name 'spritesheet-*.webp')
          test "${#spritesheets[@]}" -eq 4
          for spritesheet in "${spritesheets[@]}"; do
            test "$(head -c 4 "$spritesheet")" = 'RIFF'
            test "$(dd if="$spritesheet" bs=1 skip=8 count=4 2>/dev/null)" = 'WEBP'
          done

      - name: Upload Pages artifact
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: dist

  deploy:
    name: Deploy
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
